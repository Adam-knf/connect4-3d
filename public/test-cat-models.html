<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Model Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'DM Sans', sans-serif;
      color: #e8e8ec;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 顶部：动画按钮 */
    #top-bar {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #2a2a3a;
      border-bottom: 1px solid #3a3a4a;
    }
    #top-bar label { color: #8888a0; font-size: 14px; }
    #anim-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .anim-btn {
      padding: 8px 16px;
      background: #3a3a4a;
      border: 1px solid #4a4a5a;
      border-radius: 6px;
      color: #8888a0;
      cursor: pointer;
      font-size: 13px;
    }
    .anim-btn:hover { background: #4a4a5a; color: #e8e8ec; }
    .anim-btn.active {
      background: #3d9eff;
      border-color: #3d9eff;
      color: white;
    }
    .anim-btn.stop:hover { background: #ff8b6a; }
    #anim-info {
      margin-left: auto;
      color: #8888a0;
      font-size: 12px;
    }

    /* 中间：3D模型展示区域 */
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0f;
    }
    #canvas-container canvas {
      width: 100%;
      height: 100%;
    }

    /* 右侧：颜色按钮 */
    #side-bar {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #2a2a3a;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #3a3a4a;
    }
    #side-bar label {
      color: #8888a0;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .color-btn {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      border: 2px solid #4a4a5a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #8888a0;
    }
    .color-btn:hover { border-color: #5a5a6a; }
    .color-btn.active { border-color: #3d9eff; }
    .color-black { background: #1a1a22; }
    .color-white { background: #f0e8d8; color: #1a1a22; }
    .color-orange { background: #ff6b4a; color: white; }
    .color-blue { background: #3d9eff; color: white; }
    .color-green { background: #4ade80; color: white; }
    .color-pink { background: #ff99aa; color: white; }

    /* 底部：模型切换按钮 */
    #bottom-bar {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #2a2a3a;
      border-top: 1px solid #3a3a4a;
    }
    #bottom-bar label { color: #8888a0; font-size: 14px; }
    #model-buttons {
      display: flex;
      gap: 8px;
    }
    .model-btn {
      padding: 12px 20px;
      background: #3a3a4a;
      border: 1px solid #4a4a5a;
      border-radius: 6px;
      color: #8888a0;
      cursor: pointer;
      font-size: 14px;
    }
    .model-btn:hover { background: #4a4a5a; color: #e8e8ec; }
    .model-btn.active {
      background: #3d9eff;
      border-color: #3d9eff;
      color: white;
    }
    #model-info {
      margin-left: auto;
      color: #8888a0;
      font-size: 12px;
    }

    /* 加载提示 */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #2a2a3a;
      padding: 20px 40px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- 顶部：动画按钮 -->
  <div id="top-bar">
    <label>动画:</label>
    <div id="anim-buttons"></div>
    <span id="anim-info">--</span>
    <div style="border-left: 1px solid #4a4a5a; margin-left: 16px; padding-left: 16px;">
      <label>游戏动画:</label>
      <div id="game-anim-buttons">
        <button class="anim-btn game-anim" data-anim="Idle">呼吸</button>
        <button class="anim-btn game-anim" data-anim="Fall">下落</button>
        <button class="anim-btn game-anim" data-anim="Hover">悬停</button>
        <button class="anim-btn game-anim" data-anim="Sleep">趴睡</button>
        <button class="anim-btn game-anim" data-anim="Win">胜利</button>
        <button class="anim-btn game-anim" data-anim="Lose">失败</button>
        <button class="anim-btn game-anim stop" data-anim="stop" style="background:#ff6b4a;">停止</button>
      </div>
    </div>
  </div>

  <!-- 中间：3D模型 -->
  <div id="canvas-container"></div>

  <!-- 右侧：颜色按钮 -->
  <div id="side-bar">
    <label>颜色</label>
    <button class="color-btn color-black active" data-color="0x1a1a22" title="黑猫">黑</button>
    <button class="color-btn color-white" data-color="0xf0e8d8" title="白猫">白</button>
    <button class="color-btn color-orange" data-color="0xff6b4a" title="橘猫">橘</button>
    <button class="color-btn color-blue" data-color="0x3d9eff" title="蓝">蓝</button>
    <button class="color-btn color-green" data-color="0x4ade80" title="绿">绿</button>
    <button class="color-btn color-pink" data-color="0xff99aa" title="粉">粉</button>
  </div>

  <!-- 底部：模型切换 -->
  <div id="bottom-bar">
    <label>模型:</label>
    <div id="model-buttons">
      <button class="model-btn active" data-model="black_cat.glb">black_cat</button>
      <button class="model-btn" data-model="lucky_cat_with_animation_cute_maneki_neko.glb">lucky_cat</button>
      <button class="model-btn" data-model="toon_cat_free.glb">toon_cat</button>
    </div>
    <span id="model-info">加载中...</span>
  </div>

  <!-- 加载提示 -->
  <div id="loading">加载中...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // === 状态管理 ===
    const state = {
      currentModel: 'black_cat.glb',
      currentAnimName: null,
      currentColor: 0x1a1a22,
      loadedModel: null,
      animations: [],
      mixer: null
    };

    // === Three.js 初始化 ===
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / (window.innerHeight - 120), 0.1, 100);
    camera.position.set(2, 2, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    // 光照
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const directional = new THREE.DirectionalLight(0xffffff, 0.8);
    directional.position.set(5, 10, 5);
    scene.add(directional);
    const fill = new THREE.DirectionalLight(0x3d9eff, 0.3);
    fill.position.set(-5, 5, -5);
    scene.add(fill);

    // === 模型加载 ===
    const loader = new GLTFLoader();
    const modelBasePath = '/game/connect4/assets/testcat/';

    function loadModel(modelName) {
      document.getElementById('loading').style.display = 'block';

      // 清除旧模型
      if (state.loadedModel) {
        scene.remove(state.loadedModel);
        state.loadedModel.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach(m => m.dispose());
            } else {
              child.material.dispose();
            }
          }
        });
      }
      if (state.mixer) {
        state.mixer.stopAllAction();
        state.mixer = null;
      }
      state.animations = [];
      state.currentAnimName = null;

      loader.load(modelBasePath + modelName, (gltf) => {
        const obj = gltf.scene;
        state.loadedModel = obj;

        // 居中并缩放
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / maxDim;
        obj.scale.multiplyScalar(scale);
        obj.position.sub(center.multiplyScalar(scale));

        // 模型中心在地面
        obj.position.set(0, 0, 0);
        obj.rotation.set(0, 0, 0);

        // 重置相机位置
        camera.position.set(3, 2, 3);
        controls.target.set(0, 0, 0);
        controls.update();

        // 应用当前颜色
        applyColor(state.currentColor);

        scene.add(obj);

        // 处理动画
        if (gltf.animations && gltf.animations.length > 0) {
          state.mixer = new THREE.AnimationMixer(obj);
          gltf.animations.forEach(clip => {
            state.animations.push({
              clip,
              name: clip.name || 'anim_' + state.animations.length,
              action: state.mixer.clipAction(clip)
            });
          });
        }

        // 创建动画按钮
        updateAnimButtons();

        // 默认播放 Idle 动画
        playAnimByName('Idle');

        // 更新模型信息
        document.getElementById('model-info').innerHTML =
          `已加载: ${modelName}<br>动画: ${state.animations.length} | 网格: ${gltf.scene.children.length}`;

        document.getElementById('loading').style.display = 'none';

      }, undefined, (error) => {
        console.error(error);
        document.getElementById('model-info').innerHTML = '加载失败: ' + error.message;
        document.getElementById('loading').style.display = 'none';
      });
    }

    function updateAnimButtons() {
      const animButtonsDiv = document.getElementById('anim-buttons');
      animButtonsDiv.innerHTML = '';

      if (state.animations.length === 0) {
        animButtonsDiv.innerHTML = '<span style="color:#8888a0">无内置动画</span>';
        document.getElementById('anim-info').innerHTML = '模型无动画';
        return;
      }

      state.animations.forEach((anim) => {
        const btn = document.createElement('button');
        btn.className = 'anim-btn' + (anim.name === state.currentAnimName ? ' active' : '');
        btn.textContent = anim.name.substring(0, 25);
        btn.onclick = () => playAnimByName(anim.name);
        animButtonsDiv.appendChild(btn);
      });

      document.getElementById('anim-info').innerHTML =
        `共 ${state.animations.length} 个动画`;
    }

    // 按名称播放动画（循环播放）
    function playAnimByName(name) {
      if (name === 'stop') {
        stopAnimation();
        updateButtonStates('stop');
        return;
      }

      // 查找对应名称的动画
      const anim = state.animations.find(a =>
        a.name.toLowerCase() === name.toLowerCase() ||
        a.name.toLowerCase().includes(name.toLowerCase())
      );

      if (anim) {
        // 停止所有动画，播放选中的（循环）
        state.animations.forEach(a => a.action.stop());
        anim.action.reset();
        anim.action.setLoop(THREE.LoopRepeat, Infinity);
        anim.action.play();
        state.currentAnimName = anim.name;
      } else if (name !== 'Idle') {
        // 找不到指定动画，尝试播放 Idle
        const idleAnim = state.animations.find(a =>
          a.name.toLowerCase() === 'idle' ||
          a.name.toLowerCase().includes('idle') ||
          a.name.toLowerCase().includes('breathing')
        );
        if (idleAnim) {
          state.animations.forEach(a => a.action.stop());
          idleAnim.action.reset();
          idleAnim.action.setLoop(THREE.LoopRepeat, Infinity);
          idleAnim.action.play();
          state.currentAnimName = idleAnim.name;
        } else {
          // Idle 也没有，不播放
          stopAnimation();
        }
      } else {
        // 直接请求 Idle 但没有，不播放
        stopAnimation();
      }

      updateButtonStates(name);
    }

    function stopAnimation() {
      if (state.mixer) {
        state.mixer.stopAllAction();
      }
      state.currentAnimName = null;
    }

    function updateButtonStates(activeName) {
      // 更新内置动画按钮
      document.querySelectorAll('#anim-buttons .anim-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === (state.currentAnimName || '').toLowerCase());
      });

      // 更新游戏动画按钮
      document.querySelectorAll('.game-anim').forEach(btn => {
        const btnAnim = btn.dataset.anim.toLowerCase();
        const isActive = activeName.toLowerCase() === btnAnim ||
                         (state.currentAnimName && state.currentAnimName.toLowerCase().includes(btnAnim));
        btn.classList.toggle('active', isActive);
      });
    }

    function applyColor(colorHex) {
      state.currentColor = colorHex;
      if (!state.loadedModel) return;

      state.loadedModel.traverse(child => {
        if (child.isMesh && child.material) {
          if (!child.material._customized) {
            child.material = child.material.clone();
            child.material._customized = true;
          }
          child.material.color.setHex(colorHex);
          child.material.metalness = 0.0;
          child.material.roughness = 0.6;
        }
      });

      // 更新颜色按钮状态
      document.querySelectorAll('.color-btn').forEach(btn => {
        const btnColor = parseInt(btn.dataset.color);
        btn.classList.toggle('active', btnColor === colorHex);
      });
    }

    // 绑定游戏动画按钮
    document.querySelectorAll('.game-anim').forEach(btn => {
      btn.addEventListener('click', () => {
        playAnimByName(btn.dataset.anim);
      });
    });

    // 模型切换
    document.querySelectorAll('.model-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const modelName = btn.dataset.model;
        state.currentModel = modelName;

        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        loadModel(modelName);
      });
    });

    // 颜色切换
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const colorHex = parseInt(btn.dataset.color);
        applyColor(colorHex);
      });
    });

    // === 动画循环 ===
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      if (state.mixer) state.mixer.update(clock.getDelta());
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // === 窗口大小调整 ===
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // === 初始化加载第一个模型 ===
    loadModel(state.currentModel);

  </script>
</body>
</html>
